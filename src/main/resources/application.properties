spring.application.name=hanseomate
spring.profiles.default=local
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
# Expose only non-sensitive actuator endpoints.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
# The facade performs the exact 10 MiB check. The request limit includes multipart overhead.
course-import.max-upload-bytes=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
app.upload.directory=${UPLOAD_DIRECTORY:uploads}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080}
app.upload.max-image-bytes=${UPLOAD_MAX_IMAGE_BYTES:5242880}
